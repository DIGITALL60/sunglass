kind = "web"
previewPath = "/"
title = "Sun Glass Accesorios"
version = "1.0.0"
id = "artifacts/sun-glass-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19141

[services.development]
run = "pnpm --filter @workspace/sun-glass-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sun-glass-store", "run", "build" ]
publicDir = "artifacts/sun-glass-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19141"
BASE_PATH = "/"
